# Template for YAML configuration files used by main.py.
# Copy this file, replace the example values, and keep only the parameters
# that are relevant for your run.

# Choose one:
# - "casier": grid + slope + imperviousness workflow with Shapefile output
# - "ibk": simplified Beven-Kirkby / TWI-style raster analysis
method: "casier"

# Required for both methods
tile_path: "donnees/dem_default.tif"

# Required for the "casier" method
imperviousness_path: "donnees/imperviousness_default.tif"

# Required for the "casier" method
output_path: "output"

# Required for the "casier" method
# Choose one of:
# - "mean_thresholded"
# - "best_fit_plane"
# - "slope_std_dev"
# - "slope_max"
# - "slope_mean_denoised"
slope: "best_fit_plane"

# Required for the "casier" method
casiersize: 10

# Required for the "casier" method
# Weight between 0 and 1. The slope weight is computed automatically as
# 1 - imperviousness_factor.
imperviousness_factor: 0.4
