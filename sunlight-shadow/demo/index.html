<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sunlight Demo</title>
        <style>
            html,
            body {
                margin: 0;
                height: 100%;
                overflow: hidden;
                font-family: Arial, sans-serif;
            }

            #viewerDiv {
                height: 100%;
                width: 100%;
            }

            #status {
                position: absolute;
                top: 16px;
                left: 16px;
                z-index: 10;
                max-width: 480px;
                padding: 12px 14px;
                background: rgba(255, 255, 255, 0.92);
                border-radius: 10px;
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.18);
                font-size: 14px;
                line-height: 1.4;
            }

            #status code {
                word-break: break-all;
            }
        </style>
    </head>

    <body>
        <div id="status">Loading demo…</div>
        <div id="viewerDiv"></div>

        <script src="config.js"></script>
        <script src="node_modules/itowns/dist/itowns.js"></script>
        <script src="js/csvfetcher.js"></script>
        <script src="js/shaders.js"></script>
        <script type="text/javascript">
            const params = new URLSearchParams(window.location.search);
            const defaultConfig = window.SUNLIGHT_DEMO_CONFIG || {};
            const tilesetUrl = params.get('tileset') || defaultConfig.tilesetUrl || '/data/inputs/tileset.json';
            const csvUrl = params.get('csv') || defaultConfig.csvUrl || '/data/output/output.csv';
            const status = document.getElementById('status');

            status.innerHTML = `Tileset: <code>${tilesetUrl}</code><br>CSV: <code>${csvUrl}</code>`;

            const viewerDiv = document.getElementById('viewerDiv');

            itowns.proj4.defs(
                'EPSG:3946',
                '+proj=lcc +lat_1=45.25 +lat_2=46.75 +lat_0=46 +lon_0=3 +x_0=1700000 +y_0=5200000 +ellps=GRS80 ' +
                '+towgs84=0,0,0,0,0,0,0 +units=m +no_defs'
            );
            const viewExtent = new itowns.Extent(
                'EPSG:3946', 1837816.94334, 1847692.32501, 5170036.4587, 5178412.82698
            );

            const placement = {
                coord: viewExtent.center(), tilt: 12, heading: 40, range: 6200,
            };

            const view = new itowns.PlanarView(viewerDiv, viewExtent, {
                placement: placement,
            });

            const wmsImagerySource = new itowns.WMSSource({
                extent: viewExtent,
                name: 'ortho_latest',
                url: 'https://imagerie.data.grandlyon.com/wms/grandlyon',
                version: '1.3.0',
                crs: 'EPSG:3946',
                format: 'image/jpeg',
            });

            const wmsImageryLayer = new itowns.ColorLayer('wms_imagery', {
                updateStrategy: {
                    type: itowns.STRATEGY_DICHOTOMY,
                    options: {},
                },
                source: wmsImagerySource,
            });

            view.addLayer(wmsImageryLayer);

            const wmsElevationSource = new itowns.WMSSource({
                extent: viewExtent,
                url: 'https://download.data.grandlyon.com/wms/grandlyon',
                name: 'MNT2012_Altitude_10m_CC46',
                crs: 'EPSG:3946',
                width: 256,
                format: 'image/jpeg',
            });

            const wmsElevationLayer = new itowns.ElevationLayer('wms_elevation', {
                useColorTextureElevation: true,
                colorTextureElevationMinZ: 144,
                colorTextureElevationMaxZ: 622,
                source: wmsElevationSource,
            });

            view.addLayer(wmsElevationLayer);

            const buildingSource = new itowns.OGC3DTilesSource({
                url: tilesetUrl,
            });

            const buildingsLayer = new itowns.OGC3DTilesLayer(
                'buildings',
                { source: buildingSource },
                view
            );

            loadCSV(csvUrl).then((csvText) => {
                const lightingMap = parseLightingCSV(csvText);

                buildingsLayer.addEventListener('load-model', (event) => {
                    const uri = event.tile.content.uri || event.tile.content['uri'] || '';
                    const match = uri.match(/(\d+)\.b3dm$/);
                    const tileID = match ? parseInt(match[1], 10) : 0;
                    applyLighting(event.scene.children[0], tileID, lightingMap.get(tileID));
                });

                view.addLayer(buildingsLayer);
            }).catch((error) => {
                console.error(error);
                status.innerHTML = `Failed to load demo data.<br>Tileset: <code>${tilesetUrl}</code><br>CSV: <code>${csvUrl}</code>`;
            });
        </script>
    </body>

</html>
